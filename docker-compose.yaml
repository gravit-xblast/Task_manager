# version: '3.9'

services:

  # ── SQL Server ────────────────────────────────────────────
  sqlserver:
      build:
        context: .
        dockerfile: DockerfileDB
      container_name: task_manager_db
      environment:
        SA_PASSWORD: "AdminSQLServer@P4321"    # Min 8 chars, 1 maj, 1 chiffre, 1 symbole
        ACCEPT_EULA: "Y"
        MSSQL_PID: "Express"                  
      ports:
        - "1433:1433"                           
      volumes:
        - sqlserver_data:/var/opt/mssql        
 
      healthcheck:
        test: ["CMD", "/opt/mssql-tools18/bin/sqlcmd",
               "-S", "localhost", "-U", "sa", "-P", "AdminSQLServer@P4321",
               "-Q", "SELECT 1", "-No"]
        interval: 10s
        timeout: 5s
        retries: 10
        start_period: 30s

      networks:
        - app_network

  # ── WebAPI .NET ───────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: DockerfileAPI
    container_name: task_manager_api
    ports:
      - "8080:8080"
    environment:
      - ConnectionStrings__DefaultConnection=Server=sqlserver,1433;Database=TaskManagerDB;User Id=sa;Password=AdminSQLServer@P4321;TrustServerCertificate=True
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
    depends_on:
      sqlserver:
        condition: service_healthy            
    restart: on-failure                       
    networks:
      - app_network
volumes:
  sqlserver_data:                       
networks:
  app_network: